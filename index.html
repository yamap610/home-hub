<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家庭數位管家</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/dayjs@1.11.9/dayjs.min.js"></script>
<style>
:root{
  --bg:#FDFCFA;--card:#F6F2EE;--border:#EDE4E0;
  --primary:#DCCBC3;--accent:#DDC7BF;
  --text:#584B42;--text-light:#8B7D75;
  --success:#8FB17A;--warning:#D4A574;--danger:#C9876B;--urgent:#E74C3C;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* 登入 */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 20% 20%,rgba(220,203,195,.35) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(221,199,191,.25) 0%,transparent 55%),var(--bg);}
.login-logo{font-family:'Noto Serif TC',serif;font-size:2.2rem;font-weight:300;letter-spacing:.15em;margin-bottom:.4rem;text-align:center;}
.login-sub{font-size:.78rem;color:var(--text-light);letter-spacing:.2em;margin-bottom:3rem;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:2rem;box-shadow:0 4px 24px rgba(88,75,66,.07);padding:2.5rem 2rem;width:100%;max-width:340px;}
.login-label{font-size:.75rem;letter-spacing:.18em;color:var(--text-light);margin-bottom:.6rem;display:block;}
.login-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:1rem;padding:.85rem 1.1rem;font-size:1.1rem;font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);letter-spacing:.25em;text-align:center;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-input::placeholder{letter-spacing:.1em;font-size:.9rem;color:var(--primary);}
.login-hint{font-size:.72rem;color:var(--text-light);text-align:center;margin:.6rem 0 1.8rem;}
.btn-login{width:100%;background:var(--primary);border:none;border-radius:1rem;padding:.9rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;font-weight:500;color:var(--text);letter-spacing:.15em;cursor:pointer;transition:background .2s;}
.btn-login:hover{background:var(--accent);}
.quick-codes{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;}
.quick-btn{background:var(--bg);border:1px solid var(--border);border-radius:.6rem;padding:.3rem .7rem;font-size:.78rem;color:var(--text);cursor:pointer;transition:background .15s;letter-spacing:.1em;}
.quick-btn:hover{background:var(--primary);}

/* 主框架 */
.app-wrap{max-width:480px;margin:0 auto;padding-bottom:90px;}

/* Header */
.app-header{position:sticky;top:0;z-index:100;background:rgba(253,252,250,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 1.25rem 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-logo{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:400;letter-spacing:.1em;}
.header-right{display:flex;align-items:center;gap:.6rem;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;box-shadow:0 0 0 2px rgba(143,177,122,.3);}
.sync-dot.offline{background:var(--text-light);box-shadow:none;}
.room-badge{font-size:.7rem;color:var(--text-light);background:var(--card);padding:.25rem .7rem;border-radius:.5rem;border:1px solid var(--border);cursor:pointer;letter-spacing:.08em;}

/* 問候區 */
.greeting-wrap{padding:1.5rem 1.25rem .75rem;}
.greeting-date{font-size:.72rem;color:var(--text-light);letter-spacing:.12em;margin-bottom:.3rem;}
.greeting-text{font-family:'Noto Serif TC',serif;font-size:1.45rem;font-weight:300;letter-spacing:.05em;line-height:1.4;}
.greeting-sub{font-size:.78rem;color:var(--text-light);margin-top:.35rem;}

/* 快速統計列 */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;padding:0 1rem .85rem;}
.ss-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:.85rem .6rem;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.ss-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(88,75,66,.1);}
.ss-icon{font-size:1.1rem;margin-bottom:.3rem;}
.ss-num{font-family:'Noto Serif TC',serif;font-size:1.35rem;font-weight:300;line-height:1;margin-bottom:.2rem;}
.ss-label{font-size:.58rem;color:var(--text-light);letter-spacing:.06em;}
.ss-urgent .ss-num{color:var(--urgent);}

/* 區塊標題列 */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:.1rem 1.25rem .55rem;}
.section-title{font-size:.68rem;letter-spacing:.2em;color:var(--text-light);font-weight:500;}
.section-more{font-size:.68rem;color:var(--primary);cursor:pointer;letter-spacing:.06em;}

/* 提醒急件 */
.urgent-list{padding:0 1rem;display:flex;flex-direction:column;gap:.5rem;margin-bottom:.25rem;}
.urgent-card{background:var(--card);border:1.5px solid rgba(231,76,60,.2);border-radius:1.35rem;padding:.7rem 1rem;display:flex;align-items:center;gap:.75rem;position:relative;overflow:hidden;}
.urgent-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--urgent);border-radius:1.35rem 0 0 1.35rem;}
.urgent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.urgent-body{flex:1;min-width:0;}
.urgent-title{font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urgent-due{font-size:.68rem;color:var(--urgent);margin-top:.1rem;}
.urgent-type{font-size:.62rem;padding:.08rem .4rem;border-radius:1rem;background:rgba(231,76,60,.1);color:var(--urgent);}

/* 低庫存警告 */
.lowstock-strip{margin:0 1rem .25rem;background:rgba(212,165,116,.1);border:1px solid rgba(212,165,116,.3);border-radius:1.25rem;padding:.75rem 1rem;}
.lowstock-title{font-size:.7rem;font-weight:500;color:var(--warning);margin-bottom:.4rem;}
.lowstock-items{display:flex;flex-direction:column;gap:.25rem;}
.lowstock-row{display:flex;justify-content:space-between;font-size:.75rem;}
.lowstock-name{color:var(--text);}
.lowstock-qty{color:var(--warning);font-weight:500;}

/* 衣物清洗提醒 */
.wash-strip{margin:0 1rem .25rem;background:rgba(143,177,122,.08);border:1px solid rgba(143,177,122,.25);border-radius:1.25rem;padding:.75rem 1rem;}
.wash-title{font-size:.7rem;font-weight:500;color:var(--success);margin-bottom:.4rem;}
.wash-row{display:flex;justify-content:space-between;font-size:.75rem;}

/* 最近書籤 */
.bookmark-scroll{display:flex;gap:.65rem;padding:0 1rem .85rem;overflow-x:auto;scrollbar-width:none;}
.bookmark-scroll::-webkit-scrollbar{display:none;}
.bm-mini{background:var(--card);border:1px solid var(--border);border-radius:1.2rem;overflow:hidden;width:130px;flex-shrink:0;cursor:pointer;transition:box-shadow .15s;}
.bm-mini:hover{box-shadow:0 3px 12px rgba(88,75,66,.1);}
.bm-mini-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.bm-mini-placeholder{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:linear-gradient(135deg,var(--bg),var(--primary));}
.bm-mini-body{padding:.45rem .6rem .55rem;}
.bm-mini-title{font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.15rem;}
.bm-mini-domain{font-size:.6rem;color:var(--text-light);opacity:.75;}

/* 本月費用 */
.monthly-card{margin:0 1rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1.1rem 1.25rem;}
.monthly-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.85rem;}
.monthly-label{font-size:.68rem;letter-spacing:.15em;color:var(--text-light);}
.monthly-month{font-size:.7rem;color:var(--primary);background:var(--bg);border:1px solid var(--border);border-radius:.5rem;padding:.15rem .55rem;}
.monthly-items{display:flex;flex-direction:column;gap:.4rem;}
.monthly-row{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;}
.monthly-name{display:flex;align-items:center;gap:.4rem;color:var(--text);}
.monthly-done{opacity:.55;text-decoration:line-through;}
.monthly-amount{font-weight:400;color:var(--text);font-family:'Noto Serif TC',serif;}
.monthly-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);}
.monthly-total-label{font-size:.7rem;color:var(--text-light);letter-spacing:.1em;}
.monthly-total-num{font-family:'Noto Serif TC',serif;font-size:1.15rem;font-weight:300;}

/* 快速入口 */
.quick-entry{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;padding:0 1rem .85rem;}
.qe-btn{background:var(--card);border:1px solid var(--border);border-radius:1.35rem;padding:.85rem .5rem;text-align:center;cursor:pointer;transition:all .15s;}
.qe-btn:hover{background:var(--primary);transform:translateY(-2px);}
.qe-icon{font-size:1.3rem;margin-bottom:.3rem;}
.qe-label{font-size:.62rem;color:var(--text-light);letter-spacing:.06em;}


/* 天氣卡 */
.weather-card{margin:0 1rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;}
.weather-left{flex:1;}
.weather-temp-row{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.2rem;}
.weather-temp{font-family:'Noto Serif TC',serif;font-size:2.2rem;font-weight:300;line-height:1;color:var(--text);}
.weather-unit{font-size:.8rem;color:var(--text-light);}
.weather-desc{font-size:.8rem;color:var(--text-light);margin-bottom:.3rem;}
.weather-range{font-size:.72rem;color:var(--text-light);}
.weather-right{text-align:right;flex-shrink:0;}
.weather-icon{font-size:2rem;margin-bottom:.3rem;}
.weather-city{font-size:.65rem;color:var(--text-light);letter-spacing:.08em;}
.weather-advice{margin:.5rem 1rem .2rem;background:rgba(220,203,195,.25);border:1px solid var(--border);border-radius:1rem;padding:.6rem 1rem;font-size:.75rem;color:var(--text-light);line-height:1.6;}
.weather-loading{margin:0 1rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1rem 1.25rem;font-size:.78rem;color:var(--text-light);text-align:center;}

/* 設定 Modal */
.settings-overlay{position:fixed;inset:0;background:rgba(88,75,66,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.settings-sheet{background:var(--bg);border-radius:2rem 2rem 0 0;width:100%;max-width:480px;padding:1.5rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom,0px));}
.settings-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.5rem;}
.settings-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:400;letter-spacing:.1em;margin-bottom:1.5rem;text-align:center;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:.85rem 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-key{font-size:.82rem;color:var(--text);}
.settings-val{font-size:.78rem;color:var(--text-light);}
.settings-logout{width:100%;margin-top:1.25rem;padding:.85rem;background:rgba(201,135,107,.1);border:1px solid rgba(201,135,107,.3);border-radius:1rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.85rem;color:var(--danger);cursor:pointer;}

/* 底部導覽 */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(253,252,250,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:.6rem 0 calc(.6rem + env(safe-area-inset-bottom,0px));z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;opacity:.4;cursor:pointer;padding:.2rem .8rem;border-radius:1rem;transition:opacity .15s;}
.nav-item.active{opacity:1;}
.nav-item-icon{font-size:1.2rem;}
.nav-item-label{font-size:.58rem;letter-spacing:.12em;color:var(--text-light);}
.nav-item.active .nav-item-label{color:var(--text);font-weight:500;}

/* Toast */
.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:.65rem 1.4rem;border-radius:2rem;font-size:.8rem;z-index:500;white-space:nowrap;animation:toastIn .25s ease forwards;pointer-events:none;}
@keyframes toastIn{from{transform:translateX(-50%) translateY(10px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

/* 空白提示 */
.empty-section{padding:.5rem 1rem 1rem;font-size:.78rem;color:var(--text-light);text-align:center;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const FIREBASE_CONFIG={apiKey:"AIzaSyAFGSQOvAp1thZkWBZ-nLHe-uR8llDQDI8",authDomain:"home-hub-be41f.firebaseapp.com",projectId:"home-hub-be41f",storageBucket:"home-hub-be41f.firebasestorage.app",messagingSenderId:"286497032414",appId:"1:286497032414:web:16d3f0242a400d0de85a4f"};
let db=null,fbOk=false;
try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();db.enablePersistence({synchronizeTabs:true}).catch(()=>{});fbOk=true;}catch(e){}

function col(path){return db&&fbOk?db.collection(path):null;}

const REMINDER_TYPE={financial:'💳',subscription:'📱',consumable:'🔄',chore:'🏠',health:'💊',other:'📌'};
const REMINDER_TYPE_LABEL={financial:'財務',subscription:'訂閱',consumable:'耗材',chore:'家務',health:'健康',other:'其他'};
const CAT_WIKI={recipe:'🍳',health:'💊',baby:'🍼',home:'🏠',finance:'💰',travel:'✈️',tool:'🔧',memo:'📝',other:'📌'};

const LL=k=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}};
const SL=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

function getDomain(url){try{return new URL(url).hostname.replace('www.','');}catch{return '';}}

/* 問候語 */
function getGreeting(){
  const h=dayjs().hour();
  if(h<6)  return{text:'深夜了，注意休息',sub:'晚安 🌙'};
  if(h<12) return{text:'早安，美好的一天',sub:'今日要完成的事都記得了嗎？'};
  if(h<14) return{text:'午安，稍事休息',sub:'下午繼續加油 ☀️'};
  if(h<18) return{text:'午後好',sub:'今天過得如何？'};
  if(h<22) return{text:'晚上好',sub:'家人都平安就是最好的一天 🌿'};
  return{text:'夜深了',sub:'記得早點休息 🌙'};
}

/* ── 登入頁 ── */
function LoginPage({onLogin}){
  const[code,setCode]=React.useState('');const[err,setErr]=React.useState('');
  function go(){const t=code.trim();if(!t){setErr('請輸入房間碼');return;}if(t.length<4){setErr('至少4位');return;}onLogin(t);}
  return(
    <div className="login-wrap">
      <div className="login-logo">家庭數位管家</div>
      <div className="login-sub">FAMILY DIGITAL BUTLER</div>
      <div className="login-card">
        <label className="login-label">房間碼 ROOM CODE</label>
        <input className="login-input" placeholder="輸入你的房間碼" value={code} maxLength={12}
          onChange={e=>{setCode(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&go()}/>
        {err&&<div style={{fontSize:'.72rem',color:'var(--danger)',textAlign:'center',marginTop:'.4rem'}}>{err}</div>}
        <div className="login-hint">家人共用相同房間碼，資料即時同步</div>
        <button className="btn-login" onClick={go}>進入管家 →</button>
        <div className="quick-codes">
          {['DEMO','HOME','FAMILY'].map(c=>(
            <button key={c} className="quick-btn" onClick={()=>{setCode(c);setErr('');}}>{ c}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── 設定 Modal ── */
function SettingsModal({roomCode,onClose,onLogout}){
  return(
    <div className="settings-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="settings-sheet">
        <div className="settings-handle"/>
        <div className="settings-title">設定</div>
        <div className="settings-row">
          <span className="settings-key">房間碼</span>
          <span className="settings-val">{roomCode}</span>
        </div>
        <div className="settings-row">
          <span className="settings-key">同步狀態</span>
          <span className="settings-val">{fbOk?'✓ Firebase 已連線':'本機模式'}</span>
        </div>
        <div className="settings-row">
          <span className="settings-key">版本</span>
          <span className="settings-val">v1.0.0</span>
        </div>
        <button className="settings-logout" onClick={onLogout}>登出此房間</button>
      </div>
    </div>
  );
}

/* ── 書籤縮圖卡 ── */
function BmMini({article,onClick}){
  const[imgErr,setImgErr]=React.useState(false);
  const img=article.imageUrl||(article.og?.ogImage)||'';
  const catIcon=CAT_WIKI[article.category]||'📌';
  return(
    <div className="bm-mini" onClick={onClick}>
      {img&&!imgErr
        ?<img className="bm-mini-img" src={img} alt={article.title} onError={()=>setImgErr(true)}/>
        :<div className="bm-mini-placeholder">{catIcon}</div>}
      <div className="bm-mini-body">
        <div className="bm-mini-title">{article.title}</div>
        {article.domain&&<div className="bm-mini-domain">{article.domain}</div>}
      </div>
    </div>
  );
}


/* 天氣 code → emoji */
function weatherIcon(code){
  if(code===0)return'☀️';
  if(code<=2)return'🌤';
  if(code<=3)return'☁️';
  if(code<=49)return'🌫';
  if(code<=55)return'🌦';
  if(code<=65)return'🌧';
  if(code<=75)return'🌨';
  if(code<=82)return'🌦';
  if(code<=99)return'⛈';
  return'🌡';
}
function weatherDesc(code){
  if(code===0)return'晴天';if(code<=2)return'晴時多雲';if(code<=3)return'多雲';
  if(code<=49)return'有霧';if(code<=55)return'毛毛雨';if(code<=65)return'有雨';
  if(code<=75)return'下雪';if(code<=82)return'陣雨';if(code<=99)return'雷陣雨';
  return'';
}
function clothingAdvice(temp,code){
  const rain=code>=51&&code<=99;
  const hot=temp>=30;const warm=temp>=24;const cool=temp>=18;const cold=temp>=10;
  let base='';
  if(hot)base='今天很熱，輕薄透氣的衣物最舒適';
  else if(warm)base='溫度宜人，短袖或薄外套都合適';
  else if(cool)base='有點涼意，建議帶件薄外套';
  else if(cold)base='天氣偏冷，記得穿上保暖外套';
  else base='氣溫偏低，多穿一件、注意保暖';
  return base+(rain?'，記得帶傘 ☂️':'');
}

/* ── 主應用 ── */
function App(){
  const[rc,setRc]               =React.useState(()=>localStorage.getItem('last_room_hub')||'');

  const[toast,setToast]         =React.useState(null);

  React.useEffect(()=>{

    localStorage.setItem('last_room_hub',rc);

      setInventory(LL(`inv_${rc}`)||[]);
      setWardrobe(LL(`ward2_${rc}`)||[]);
      setWiki(LL(`wiki_${rc}`)||[]);
      setOnline(false);
      return;
    }
    setLoading(true);
    const unsub1=db.collection('reminders').doc(rc).collection('items')
      .onSnapshot(s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));setReminders(d);setLoading(false);setOnline(true);},(()=>{}));
    const unsub2=db.collection('inventory').doc(rc).collection('items')
      .onSnapshot(s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));setInventory(d);},(()=>{}));
    const unsub3=db.collection('wardrobe').doc(rc).collection('items')
      .onSnapshot(s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));setWardrobe(d);},(()=>{}));
    const unsub4=db.collection('wiki').doc(rc).collection('articles').orderBy('updatedAt','desc').limit(6)
      .onSnapshot(s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));setWiki(d);},(()=>{}));
    unsubs.current=[unsub1,unsub2,unsub3,unsub4];
    return()=>unsubs.current.forEach(u=>u());
  },[rc]);

  const[weather,setWeather]=React.useState(null);
  const[weatherLoading,setWeatherLoading]=React.useState(true);

  const t2=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};


  // 天氣抓取
  React.useEffect(()=>{
    if(!rc)return;
    setWeatherLoading(true);
    function fetchWeather(lat,lon,city){
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=Asia/Taipei&forecast_days=1`)
        .then(r=>r.json())
        .then(d=>{
          setWeather({
            temp: Math.round(d.current.temperature_2m),
            max:  Math.round(d.daily.temperature_2m_max[0]),
            min:  Math.round(d.daily.temperature_2m_min[0]),
            code: d.current.weathercode,
            city,
          });
          setWeatherLoading(false);
        })
        .catch(()=>setWeatherLoading(false));
    }
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>fetchWeather(pos.coords.latitude,pos.coords.longitude,'目前位置'),
        ()=>fetchWeather(25.0478,121.5319,'台北市') // 預設台北
      );
    }else{
      fetchWeather(25.0478,121.5319,'台北市');
    }
  },[rc]);

  function handleLogout(){
    unsubs.current.forEach(u=>u());unsubs.current=[];
    setRc('');setReminders([]);setInventory([]);setWardrobe([]);setWiki([]);
    localStorage.removeItem('last_room_hub');
    setShowSettings(false);
  }

  /* ── 計算各模組數據 ── */
  const today=dayjs().format('YYYY-MM-DD');

  // 提醒：逾期 + 7天內
  const urgentReminders=reminders.filter(r=>{
    if(r.status==='completed')return false;
    if(!r.dueDate)return false;
    const diff=dayjs(r.dueDate).diff(dayjs(today),'day');
    return diff<=3;
  }).sort((a,b)=>dayjs(a.dueDate).diff(dayjs(b.dueDate)));

  // 庫存：低庫存
  const lowStock=inventory.filter(i=>i.threshold>0&&i.quantity<=i.threshold);

  // 衣物：需要清洗
  const needWash=wardrobe.filter(c=>c.cleaningCycle>0&&c.wearCount>=c.cleaningCycle);

  // 本月財務/訂閱
  const thisMonth=dayjs().format('YYYY-MM');
  const monthlyItems=reminders.filter(r=>['financial','subscription'].includes(r.type)&&r.dueDate&&dayjs(r.dueDate).format('YYYY-MM')===thisMonth&&r.amount);
  const paidItems=monthlyItems.filter(r=>{
    return (r.completionHistory||[]).some(h=>dayjs(h.completedAt).format('YYYY-MM')===thisMonth);
  });
  const monthlyTotal=monthlyItems.reduce((s,r)=>s+Number(r.amount||0),0);

  // 快速入口
  // 跳轉模組，帶入房間碼讓對方自動登入
  function openModule(name){
    const map={
      提醒:'module-reminders.html',
      庫存:'module-inventory.html',
      衣櫥:'module-wardrobe.html',
      百科:'module-wiki.html',
    };
    if(map[name]) window.location.href=`${map[name]}?room=${encodeURIComponent(rc)}`;
  }

  const greeting=getGreeting();

  if(!rc)return <LoginPage onLogin={code=>setRc(code)}/>;

  return(
    <div className="app-wrap">

      {/* Header */}
      <div className="app-header">
        <div className="header-inner">
          <div className="header-logo">家庭數位管家</div>
          <div className="header-right">
            <div className={`sync-dot${online?'':' offline'}`} title={online?'已連線':'本機模式'}/>
            <div className="room-badge" onClick={()=>setShowSettings(true)}>🏠 {rc} ⚙️</div>
          </div>
        </div>
      </div>

      {/* 問候 */}
      <div className="greeting-wrap">
        <div className="greeting-date">{dayjs().format('YYYY年MM月DD日')} 星期{['日','一','二','三','四','五','六'][dayjs().day()]}</div>
        <div className="greeting-text">{greeting.text}</div>
        <div className="greeting-sub">{greeting.sub}</div>
      </div>


      {/* 天氣 */}
      {weatherLoading&&<div className="weather-loading">⏳ 取得天氣中…</div>}
      {!weatherLoading&&weather&&(<>
        <div className="weather-card">
          <div className="weather-left">
            <div className="weather-temp-row">
              <span className="weather-temp">{weather.temp}</span>
              <span className="weather-unit">°C</span>
            </div>
            <div className="weather-desc">{weatherDesc(weather.code)}</div>
            <div className="weather-range">最高 {weather.max}° · 最低 {weather.min}°</div>
          </div>
          <div className="weather-right">
            <div className="weather-icon">{weatherIcon(weather.code)}</div>
            <div className="weather-city">{weather.city}</div>
          </div>
        </div>
        <div className="weather-advice">👗 {clothingAdvice(weather.temp,weather.code)}</div>
      </>)}

      {/* 快速統計 */
      <div className="stats-strip">
        <div className="ss-card ss-urgent" onClick={()=>openModule('提醒')}>
          <div className="ss-icon">📋</div>
          <div className="ss-num">{urgentReminders.length}</div>
          <div className="ss-label">急件提醒</div>
        </div>
        <div className="ss-card" onClick={()=>openModule('庫存')}>
          <div className="ss-icon">📦</div>
          <div className="ss-num" style={{color:lowStock.length>0?'var(--warning)':'var(--text)'}}>{lowStock.length}</div>
          <div className="ss-label">低庫存</div>
        </div>
        <div className="ss-card" onClick={()=>openModule('衣櫥')}>
          <div className="ss-icon">👗</div>
          <div className="ss-num" >{wardrobe.length}</div>
          <div className="ss-label">衣物數</div>
        </div>
        <div className="ss-card" onClick={()=>openModule('百科')}>
          <div className="ss-icon">📖</div>
          <div className="ss-num">{wiki.length}</div>
          <div className="ss-label">書籤</div>
        </div>
      </div>

      {/* 急件提醒 */}
      {urgentReminders.length>0&&(<>
        <div className="section-header">
          <div className="section-title">⚡ 急件提醒</div>
          <div className="section-more" onClick={()=>openModule('提醒')}>全部 →</div>
        </div>
        <div className="urgent-list">
          {urgentReminders.slice(0,4).map(r=>{
            const diff=dayjs(r.dueDate).diff(dayjs(today),'day');
            const label=diff<0?`逾期 ${Math.abs(diff)} 天`:diff===0?'今天到期':diff===1?'明天到期':`${diff} 天後`;
            return(
              <div key={r.id} className="urgent-card">
                <div className="urgent-dot" style={{background:diff<0?'var(--urgent)':diff<=1?'var(--urgent)':'var(--warning)'}}/>
                <div className="urgent-body">
                  <div className="urgent-title">{r.title}</div>
                  <div className="urgent-due">{label}</div>
                </div>
                <span className="urgent-type">{REMINDER_TYPE[r.type]||'📌'} {REMINDER_TYPE_LABEL[r.type]||''}</span>
              </div>
            );
          })}
        </div>
      </>)}

      {/* 本月財務 */}
      {monthlyItems.length>0&&(<>
        <div className="section-header" style={{marginTop:'.75rem'}}>
          <div className="section-title">💰 本月費用</div>
          <div className="monthly-month" style={{fontSize:'.68rem',color:'var(--primary)',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'.45rem',padding:'.12rem .5rem'}}>{dayjs().format('MM月')}</div>
        </div>
        <div className="monthly-card">
          <div className="monthly-items">
            {monthlyItems.slice(0,5).map(r=>{
              const paid=paidItems.some(p=>p.id===r.id);
              return(
                <div key={r.id} className="monthly-row">
                  <span className={`monthly-name${paid?' monthly-done':''}`}>
                    {REMINDER_TYPE[r.type]||'💳'} {r.title}
                  </span>
                  <span className={`monthly-amount${paid?' monthly-done':''}`}>
                    TWD {Number(r.amount).toLocaleString()}
                  </span>
                </div>
              );
            })}
          </div>
          {monthlyTotal>0&&(
            <div className="monthly-total-row">
              <span className="monthly-total-label">本月合計</span>
              <span className="monthly-total-num">TWD {monthlyTotal.toLocaleString()}</span>
            </div>
          )}
        </div>
      </>)}

      {/* 低庫存 */}
      {lowStock.length>0&&(<>
        <div className="section-header">
          <div className="section-title">📦 庫存不足</div>
          <div className="section-more" onClick={()=>openModule('庫存')}>前往補充 →</div>
        </div>
        <div className="lowstock-strip">
          <div className="lowstock-title">⚠️ {lowStock.length} 個品項需要補充</div>
          <div className="lowstock-items">
            {lowStock.slice(0,4).map(i=>(
              <div key={i.id} className="lowstock-row">
                <span className="lowstock-name">{i.name}</span>
                <span className="lowstock-qty">{i.quantity}/{i.threshold} {i.unit}</span>
              </div>
            ))}
            {lowStock.length>4&&<div style={{fontSize:'.68rem',color:'var(--warning)',opacity:.7,marginTop:'.2rem'}}>還有 {lowStock.length-4} 個…</div>}
          </div>
        </div>
      </>)}

      {/* 衣物清洗 */}
      {/* 無資料時引導 */}
      {reminders.length===0&&inventory.length===0&&wiki.length===0&&(
        <div style={{padding:'2rem 1.5rem',textAlign:'center',color:'var(--text-light)'}}>
          <div style={{fontSize:'2rem',marginBottom:'1rem',opacity:.4}}>🏡</div>
          <div style={{fontSize:'.85rem',lineHeight:1.9}}>歡迎使用家庭數位管家<br/>點擊下方導覽列開始記錄</div>
        </div>
      )}

      {/* 底部導覽 */}
      <div className="bottom-nav">
        {[{icon:'🏡',label:'首頁',active:true},{icon:'📋',label:'提醒',mod:'提醒'},{icon:'📦',label:'庫存',mod:'庫存'},{icon:'👗',label:'衣櫥',mod:'衣櫥'},{icon:'📖',label:'百科',mod:'百科'}].map((n,i)=>(
          <div key={i} className={`nav-item${n.active?' active':''}`} onClick={()=>n.mod&&openModule(n.mod)}>
            <div className="nav-item-icon">{n.icon}</div>
            <div className="nav-item-label">{n.label}</div>
          </div>
        ))}
      </div>

      {
/* 天氣卡 */
.weather-card{margin:0 1rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;}
.weather-left{flex:1;}
.weather-temp-row{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.2rem;}
.weather-temp{font-family:'Noto Serif TC',serif;font-size:2.2rem;font-weight:300;line-height:1;color:var(--text);}
.weather-unit{font-size:.8rem;color:var(--text-light);}
.weather-desc{font-size:.8rem;color:var(--text-light);margin-bottom:.3rem;}
.weather-range{font-size:.72rem;color:var(--text-light);}
.weather-right{text-align:right;flex-shrink:0;}
.weather-icon{font-size:2rem;margin-bottom:.3rem;}
.weather-city{font-size:.65rem;color:var(--text-light);letter-spacing:.08em;}
.weather-advice{margin:.5rem 1rem .2rem;background:rgba(220,203,195,.25);border:1px solid var(--border);border-radius:1rem;padding:.6rem 1rem;font-size:.75rem;color:var(--text-light);line-height:1.6;}
.weather-loading{margin:0 1rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1rem 1.25rem;font-size:.78rem;color:var(--text-light);text-align:center;}

/* 設定 Modal */}
      {showSettings&&<SettingsModal roomCode={rc} onClose={()=>setShowSettings(false)} onLogout={handleLogout}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
