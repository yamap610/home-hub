<style>
:root{--bg:#FDFCFA;--card:#F6F2EE;--border:#EDE4E0;--primary:#DCCBC3;--accent:#DDC7BF;--text:#4A3F38;--text-light:#766A63;--success:#8FB17A;--warning:#D4A574;--danger:#C9876B;--urgent:#E74C3C;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:350;min-height:100vh;-webkit-font-smoothing:antialiased;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 20% 20%,rgba(220,203,195,.35) 0%,transparent 55%),var(--bg);}
.login-logo{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:350;letter-spacing:.15em;margin-bottom:.4rem;text-align:center;}
.login-sub{font-size:.8rem;color:var(--text-light);letter-spacing:.2em;margin-bottom:3rem;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:2rem;box-shadow:0 4px 24px rgba(88,75,66,.07);padding:2.5rem 2rem;width:100%;max-width:340px;}
.login-label{font-size:.75rem;letter-spacing:.18em;color:var(--text-light);margin-bottom:.6rem;display:block;}
.login-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:1rem;padding:.85rem 1.1rem;font-size:1.1rem;font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);letter-spacing:.25em;text-align:center;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-input::placeholder{letter-spacing:.1em;font-size:.9rem;color:var(--primary);}
.login-hint{font-size:.72rem;color:var(--text-light);text-align:center;margin:.6rem 0 1.8rem;}
.btn-primary{width:100%;background:var(--primary);border:none;border-radius:1rem;padding:.9rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;font-weight:500;color:var(--text);letter-spacing:.15em;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--accent);}
.app-wrap{max-width:480px;margin:0 auto;padding-bottom:90px;}
.app-header{position:sticky;top:0;z-index:100;background:rgba(253,252,250,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 1.25rem 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:450;letter-spacing:.1em;}
.header-right{display:flex;align-items:center;gap:.5rem;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;box-shadow:0 0 0 2px rgba(143,177,122,.3);}
.sync-dot.offline{background:var(--text-light);box-shadow:none;}
.header-room{font-size:.78rem;color:var(--text-light);background:var(--card);padding:.25rem .7rem;border-radius:.5rem;border:1px solid var(--border);cursor:pointer;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;padding:1.25rem 1rem .75rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:1rem .75rem;text-align:center;box-shadow:0 2px 8px rgba(88,75,66,.05);}
.stat-num{font-family:'Noto Serif TC',serif;font-size:1.6rem;font-weight:350;line-height:1;margin-bottom:.3rem;}
.stat-label{font-size:.65rem;color:var(--text-light);letter-spacing:.1em;}
.stat-low .stat-num{color:var(--urgent);}
.tabs-wrap{padding:0 1rem .75rem;}
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:4px;gap:4px;}
.tab-btn{border:none;border-radius:1rem;padding:.6rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-light);}
.tab-btn.active{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 1px 6px rgba(88,75,66,.1);}
.tab-badge{background:var(--urgent);color:#fff;border-radius:1rem;font-size:.6rem;padding:.05rem .4rem;font-weight:500;}
.search-wrap{padding:0 1rem .5rem;}
.search-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.65rem 1rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--primary);}
.filter-scroll{display:flex;gap:.5rem;padding:0 1rem .75rem;overflow-x:auto;scrollbar-width:none;}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-chip{white-space:nowrap;background:var(--card);border:1px solid var(--border);border-radius:2rem;padding:.32rem .85rem;font-size:.73rem;color:var(--text-light);cursor:pointer;transition:all .15s;}
.filter-chip.active{background:var(--primary);border-color:var(--primary);color:var(--text);font-weight:500;}
.acc-group{margin-bottom:.2rem;}
.acc-header{display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem;cursor:pointer;user-select:none;border-radius:1rem;margin:0 .25rem;transition:background .15s;}
.acc-header:hover{background:var(--card);}
.acc-arrow{font-size:.65rem;color:var(--text-light);transition:transform .2s;flex-shrink:0;}
.acc-arrow.open{transform:rotate(90deg);}
.acc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.acc-title{font-size:.73rem;letter-spacing:.15em;color:var(--text-light);font-weight:500;flex:1;}
.acc-count{font-size:.65rem;color:var(--primary);background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.08rem .45rem;}
.acc-body{padding:0 .5rem .4rem;display:flex;flex-direction:column;gap:.45rem;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:1.35rem;padding:.65rem .95rem .65rem .85rem;box-shadow:0 1px 5px rgba(88,75,66,.05);display:flex;align-items:center;gap:.65rem;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative;overflow:hidden;}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:1.35rem 0 0 1.35rem;background:var(--card-accent,var(--primary));}
.item-card:hover{box-shadow:0 4px 14px rgba(88,75,66,.1);transform:translateY(-1px);}
.item-icon{width:32px;height:32px;border-radius:.7rem;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--bg);border:1px solid var(--border);}
.item-body{flex:1;min-width:0;}
.item-name{font-size:.87rem;font-weight:450;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.12rem;}
.item-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.item-loc{font-size:.61rem;color:var(--text-light);}
.low-badge{font-size:.59rem;color:var(--urgent);background:rgba(231,76,60,.1);border-radius:1rem;padding:.07rem .38rem;font-weight:500;}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:.28rem;flex-shrink:0;}
.qty-display{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:350;line-height:1;}
.qty-unit{font-size:.58rem;color:var(--text-light);}
.qty-controls{display:flex;align-items:center;gap:.28rem;}
.qty-btn{width:23px;height:23px;border-radius:50%;border:1px solid var(--border);background:var(--bg);font-size:.9rem;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;}
.qty-btn:hover{background:var(--primary);border-color:var(--primary);}
.qty-btn:disabled{opacity:.32;cursor:default;}
.shopping-wrap{padding:0 1rem;}
.shopping-hint{font-size:.75rem;color:var(--text-light);line-height:1.7;margin-bottom:.85rem;padding:.7rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:1.1rem;}
.shopping-item{display:flex;align-items:center;gap:.7rem;padding:.6rem .85rem;background:var(--card);border:1px solid var(--border);border-radius:1.2rem;margin-bottom:.45rem;transition:opacity .2s;}
.shopping-item.bought{opacity:.4;}
.s-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.s-check:hover,.s-check.checked{background:var(--success);border-color:var(--success);}
.s-check.checked::after{content:'✓';color:#fff;font-size:.7rem;}
.s-body{flex:1;min-width:0;}
.s-name{font-size:.84rem;color:var(--text);margin-bottom:.08rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-name.checked{text-decoration:line-through;color:var(--text-light);}
.s-loc{font-size:.63rem;color:var(--text-light);}
.s-qty{font-size:.7rem;color:var(--urgent);font-weight:500;white-space:nowrap;flex-shrink:0;}
.shopping-copy-btn{width:100%;margin-top:.5rem;padding:.62rem;background:var(--bg);border:1px solid var(--border);border-radius:1rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.78rem;color:var(--text-light);cursor:pointer;transition:background .15s;}
.shopping-copy-btn:hover{background:var(--card);}
.shopping-empty{text-align:center;padding:3rem 2rem;color:var(--text-light);}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-light);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.5;}
.empty-text{font-size:.85rem;letter-spacing:.05em;line-height:1.8;}
.fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));right:1.25rem;width:56px;height:56px;border-radius:50%;background:var(--text);border:none;color:var(--bg);font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(88,75,66,.3);transition:transform .2s;display:flex;align-items:center;justify-content:center;z-index:50;}
.fab:hover{transform:scale(1.08);}
.modal-overlay{position:fixed;inset:0;background:rgba(88,75,66,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-sheet{background:var(--bg);border-radius:2rem 2rem 0 0;width:100%;max-width:480px;max-height:calc(100vh - 80px);overflow-y:auto;padding:1.5rem 1.5rem calc(5rem + env(safe-area-inset-bottom,0px));animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.5rem;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:450;letter-spacing:.1em;margin-bottom:1.5rem;text-align:center;}
.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-size:.78rem;letter-spacing:.15em;color:var(--text-light);margin-bottom:.5rem;}
.form-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:1rem;padding:.75rem 1rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:1rem;padding:.75rem 1rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;color:var(--text);outline:none;appearance:none;cursor:pointer;}
.form-row-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:.75rem;}
.modal-actions{display:flex;gap:.75rem;margin-top:1.5rem;}
.btn-cancel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.85rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.85rem;color:var(--text-light);cursor:pointer;}
.btn-cancel:hover{background:var(--border);}
.btn-submit{flex:2;background:var(--text);border:none;border-radius:1rem;padding:.85rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.85rem;font-weight:500;color:var(--bg);cursor:pointer;letter-spacing:.1em;}
.btn-submit:hover{opacity:.85;}
.btn-submit:disabled{opacity:.4;cursor:default;}
.btn-danger-out{flex:1;background:rgba(201,135,107,.1);border:1px solid rgba(201,135,107,.3);border-radius:1rem;padding:.85rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.85rem;color:var(--danger);cursor:pointer;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
.cat-btn{background:var(--card);border:1.5px solid var(--border);border-radius:1rem;padding:.6rem .3rem;text-align:center;cursor:pointer;transition:all .15s;}
.cat-btn-icon{font-size:1.05rem;display:block;margin-bottom:.15rem;}
.cat-btn-text{font-size:.6rem;color:var(--text-light);}
.cat-btn.selected{background:var(--primary);border-color:var(--primary);}
.cat-btn.selected .cat-btn-text{color:var(--text);font-weight:500;}
.detail-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
.detail-icon{width:52px;height:52px;border-radius:1.2rem;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.detail-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:450;}
.detail-sub{font-size:.7rem;color:var(--text-light);margin-top:.2rem;}
.detail-qty-card{background:var(--card);border:1px solid var(--border);border-radius:1.5rem;padding:1.1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.detail-qty-label{font-size:.68rem;color:var(--text-light);letter-spacing:.12em;margin-bottom:.35rem;}
.detail-qty-num{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:350;line-height:1;}
.detail-qty-unit{font-size:.78rem;color:var(--text-light);margin-left:.3rem;}
.detail-qty-controls{display:flex;gap:.5rem;}
.qty-btn-lg{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);font-size:1.2rem;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.qty-btn-lg:hover{background:var(--primary);border-color:var(--primary);}
.qty-btn-lg:disabled{opacity:.35;cursor:default;}
.detail-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
.detail-info-item{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.7rem .85rem;}
.detail-info-label{font-size:.63rem;color:var(--text-light);letter-spacing:.12em;margin-bottom:.25rem;}
.detail-info-value{font-size:.85rem;color:var(--text);}
.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:.65rem 1.4rem;border-radius:2rem;font-size:.8rem;z-index:500;white-space:nowrap;animation:toastIn .25s ease forwards;pointer-events:none;}
@keyframes toastIn{from{transform:translateX(-50%) translateY(10px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;margin:0 auto;width:100%;max-width:480px;background:rgba(253,252,250,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:.6rem 0 calc(.6rem + env(safe-area-inset-bottom,0px));z-index:9999;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;opacity:.4;cursor:pointer;padding:.2rem .8rem;}
.nav-item.active{opacity:1;}
.nav-item-icon{font-size:1.35rem;}
.nav-item-label{font-size:.72rem;letter-spacing:.06em;color:var(--text-light);}
.nav-item.active .nav-item-label{color:var(--text);font-weight:500;}
</style>

<body>
<div id="root"></div>
<script type="text/babel">

const FIREBASE_CONFIG={apiKey:"AIzaSyAFGSQOvAp1thZkWBZ-nLHe-uR8llDQDI8",authDomain:"home-hub-be41f.firebaseapp.com",projectId:"home-hub-be41f",storageBucket:"home-hub-be41f.firebasestorage.app",messagingSenderId:"286497032414",appId:"1:286497032414:web:16d3f0242a400d0de85a4f"};
let db=null,fbOk=false;
try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();db.enablePersistence({synchronizeTabs:true}).catch(()=>{});fbOk=true;}catch(e){}
const invRef=rc=>db&&fbOk?db.collection('inventory').doc(rc).collection('items'):null;

const CATS=[
  {key:'food',label:'食品',icon:'🥫',color:'#E67E22'},
  {key:'drink',label:'飲料',icon:'🧃',color:'#3498DB'},
  {key:'frozen',label:'冷凍',icon:'🧊',color:'#5DADE2'},
  {key:'clean',label:'清潔',icon:'🧹',color:'#2ECC71'},
  {key:'bath',label:'浴室',icon:'🧴',color:'#9B59B6'},
  {key:'medical',label:'藥品',icon:'💊',color:'#E74C3C'},
  {key:'baby',label:'嬰幼兒',icon:'🍼',color:'#F39C12'},
  {key:'kitchen',label:'廚房',icon:'🍳',color:'#E91E63'},
  {key:'pet',label:'寵物',icon:'🐾',color:'#795548'},
  {key:'office',label:'文具',icon:'✏️',color:'#607D8B'},
  {key:'other',label:'其他',icon:'📦',color:'#95A5A6'},
];
const CAT=Object.fromEntries(CATS.map(c=>[c.key,c]));
const UNITS=['個','盒','包','袋','瓶','罐','條','片','顆','kg','g','L','ml','捲','組','雙','件','份'];
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const isLow=item=>item.threshold>0&&item.quantity<=item.threshold;
const loadL=rc=>{try{return JSON.parse(localStorage.getItem(`inv_${rc}`)||'[]');}catch{return[];}};
const saveL=(rc,d)=>{try{localStorage.setItem(`inv_${rc}`,JSON.stringify(d));}catch{}};

function LoginPage({onLogin}){
  const[code,setCode]=React.useState('');const[err,setErr]=React.useState('');
  function go(){const t=code.trim();if(!t){setErr('請輸入房間碼');return;}if(t.length<4){setErr('至少4位');return;}onLogin(t);}
  return(<div className="login-wrap"><div className="login-logo">家庭數位管家</div><div className="login-sub">INVENTORY</div><div className="login-card"><label className="login-label">房間碼 ROOM CODE</label><input className="login-input" placeholder="輸入你的房間碼" value={code} maxLength={12} onChange={e=>{setCode(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&go()}/>{err&&<div style={{fontSize:'.72rem',color:'var(--danger)',textAlign:'center',marginTop:'.4rem'}}>{err}</div>}<div className="login-hint">與家人共用相同房間碼</div><button className="btn-primary" onClick={go}>進入庫存 →</button></div></div>);
}

function FormModal({initial,onSave,onClose}){
  const isEdit=!!initial?.id;
  const[f,setF]=React.useState({name:initial?.name||'',category:initial?.category||'food',quantity:initial?.quantity??1,unit:initial?.unit||'個',threshold:initial?.threshold??1,barcode:initial?.barcode||'',location:initial?.location||'',note:initial?.note||''});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  function save(){if(!f.name.trim())return;onSave({...(initial||{}),id:initial?.id||gid(),...f,quantity:Number(f.quantity)||0,threshold:Number(f.threshold)||0,updatedAt:Date.now(),createdAt:initial?.createdAt||Date.now()});}
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        <div className="modal-title">{isEdit?'編輯庫存':'新增庫存'}</div>
        <div className="form-group"><label className="form-label">分類</label><div className="cat-grid">{CATS.map(c=>(<button key={c.key} className={`cat-btn${f.category===c.key?' selected':''}`} onClick={()=>s('category',c.key)}><span className="cat-btn-icon">{c.icon}</span><span className="cat-btn-text">{c.label}</span></button>))}</div></div>
        <div className="form-group"><label className="form-label">品項名稱 *</label><input className="form-input" placeholder="例：衛生紙、雞蛋" value={f.name} onChange={e=>s('name',e.target.value)}/></div>
        <div className="form-row-3">
          <div className="form-group"><label className="form-label">數量</label><input type="number" className="form-input" min="0" value={f.quantity} onChange={e=>s('quantity',e.target.value)}/></div>
          <div className="form-group"><label className="form-label">單位</label><select className="form-select" value={f.unit} onChange={e=>s('unit',e.target.value)}>{UNITS.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
          <div className="form-group"><label className="form-label">警告值</label><input type="number" className="form-input" min="0" value={f.threshold} onChange={e=>s('threshold',e.target.value)}/></div>
        </div>
        <div className="form-group"><label className="form-label">條碼（選填）</label><input className="form-input" placeholder="可掃描後貼上" value={f.barcode} onChange={e=>s('barcode',e.target.value)}/></div>
        <div className="form-group"><label className="form-label">擺放位置（選填）</label><input className="form-input" placeholder="例：廚房第二格" value={f.location} onChange={e=>s('location',e.target.value)}/></div>
        <div className="form-group"><label className="form-label">備註（選填）</label><input className="form-input" placeholder="選填" value={f.note} onChange={e=>s('note',e.target.value)}/></div>
        <div className="modal-actions"><button className="btn-cancel" onClick={onClose}>取消</button><button className="btn-submit" onClick={save} disabled={!f.name.trim()}>{isEdit?'儲存修改':'新增'}</button></div>
      </div>
    </div>
  );
}

function ShoppingTab({items}){

  function handleParse(){setErr('');setPreview(null);if(!csvText.trim()){setErr('請貼上內容');return;}const result=Papa.parse(csvText.trim(),{header:true,skipEmptyLines:true});if(!result.data.length){setErr('解析失敗');return;}const parsed=result.data.filter(r=>r.name?.trim()).map(r=>({id:gid(),name:r.name?.trim()||'',category:VALID_CATS.includes(r.category?.trim())?r.category.trim():'other',quantity:Number(r.quantity)||0,unit:r.unit?.trim()||'個',threshold:Number(r.threshold)||0,barcode:r.barcode?.trim()||'',location:r.location?.trim()||'',note:r.note?.trim()||'',createdAt:Date.now(),updatedAt:Date.now()}));if(!parsed.length){setErr('沒有有效資料（name 必填）');return;}setPreview(parsed);}
  function handleExport(){const header='name,category,quantity,unit,threshold,barcode,location,note';const rows=items.map(i=>[i.name,i.category,i.quantity,i.unit,i.threshold||0,i.barcode||'',i.location||'',i.note||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));const csv=[header,...rows].join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`inventory_${Date.now()}.csv`;a.click();URL.revokeObjectURL(url);}
  const SH={background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.85rem 1rem',fontSize:'.73rem',color:'var(--text-light)',lineHeight:1.8,marginBottom:'.75rem'};
  const SF={background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.75rem 1rem',fontSize:'.7rem',color:'var(--text-light)',fontFamily:'monospace',lineHeight:1.8,marginBottom:'.75rem',whiteSpace:'pre-wrap',overflowX:'auto'};

        <div style={{display:'flex',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'3px',gap:'3px',marginBottom:'.85rem'}}>
          {[['guide','📋 說明'],['import','📥 匯入'],['export','📤 匯出']].map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'.5rem',border:'none',borderRadius:'.7rem',fontFamily:'inherit',fontSize:'.78rem',cursor:'pointer',background:tab===k?'var(--bg)':'transparent',color:tab===k?'var(--text)':'var(--text-light)',fontWeight:tab===k?500:300}}>{l}</button>))}
        </div>
        {tab==='guide'&&(<>
          <div style={SH}>
            <b style={{color:'var(--text)'}}>步驟：</b><br/>
            ① 開啟 Google Sheet，第一列填欄位名稱（見下方格式）<br/>
            ② 填寫資料，選項欄位只能填規定的值<br/>
            ③ 全選資料 → 複製（Ctrl+C）<br/>
            ④ 切換「匯入」→ 貼上 → 解析預覽 → 確認匯入<br/><br/>
            <b style={{color:'var(--text)'}}>Sheet 有異動後如何更新：</b><br/>
            在 Sheet 修改完成後，重新全選複製，再次執行匯入。<br/>
            ⚠️ 相同 name 的品項會自動略過，若要修改已有的資料，<br/>
            請先在 App 刪除該品項，再重新匯入新版本。
          </div>
          <div style={SH}>
            <b style={{color:'var(--text)'}}>欄位對照：</b><br/>
            <b style={{color:'var(--text)'}}>name</b>（必填）— 品項名稱<br/>
            <b style={{color:'var(--text)'}}>category</b>（必填）— 分類，只能填：<br/>
            　food 食品 / drink 飲料 / frozen 冷凍 / clean 清潔<br/>
            　bath 浴室 / medical 藥品 / baby 嬰幼兒 / kitchen 廚房<br/>
            　pet 寵物 / office 文具 / other 其他<br/>
            <b style={{color:'var(--text)'}}>quantity</b> — 目前數量（數字）<br/>
            <b style={{color:'var(--text)'}}>unit</b> — 單位：個/盒/包/袋/瓶/罐/條/片/顆/kg/g/L/ml/捲/組/雙/件/份<br/>

            <b style={{color:'var(--text)'}}>barcode</b> — 條碼（可留空）<br/>
            <b style={{color:'var(--text)'}}>location</b> — 擺放位置（可留空）<br/>
            <b style={{color:'var(--text)'}}>note</b> — 備註（可留空）
          </div>
          <div style={SF}>{EXAMPLE}</div>
        </>)}
        {tab==='import'&&(<>
          <div style={SH}>從 Google Sheet 複製全部資料後貼到下方（含第一列標題）。</div>
          <div style={{marginBottom:'.75rem'}}>
            <label style={{fontSize:'.72rem',letterSpacing:'.15em',color:'var(--text-light)',display:'block',marginBottom:'.5rem'}}>貼上 Google Sheet 內容</label>
            <textarea style={{width:'100%',minHeight:160,background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:'1rem',padding:'.75rem 1rem',fontFamily:'monospace',fontSize:'.75rem',color:'var(--text)',outline:'none',resize:'vertical',lineHeight:1.6}} placeholder={'name,category,quantity,unit,threshold,barcode,location,note\n衛生紙,clean,3,包,2,,浴室,'} value={csvText} onChange={e=>{setCsvText(e.target.value);setPreview(null);setErr('');}}/>
          </div>
          {err&&<div style={{fontSize:'.75rem',color:'var(--danger)',marginBottom:'.75rem'}}>{err}</div>}
          {preview&&(<div style={{background:'rgba(143,177,122,.1)',border:'1px solid rgba(143,177,122,.3)',borderRadius:'1rem',padding:'.75rem 1rem',marginBottom:'.75rem',fontSize:'.78rem',color:'var(--text)'}}>解析到 <b>{preview.length}</b> 筆，確認後點「匯入」<div style={{marginTop:'.4rem',color:'var(--text-light)',fontSize:'.7rem'}}>{preview.slice(0,3).map((p,i)=><div key={i}>• {p.name} — {p.category} {p.quantity}{p.unit}</div>)}{preview.length>3&&<div>…還有 {preview.length-3} 筆</div>}</div></div>)}
          <div style={{display:'flex',gap:'.75rem'}}>
            <button style={{flex:1,background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',color:'var(--text-light)',cursor:'pointer'}} onClick={()=>{setCsvText('');setPreview(null);setErr('');}}>清除</button>
            {!preview?<button style={{flex:2,background:'var(--text)',border:'none',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',fontWeight:500,color:'var(--bg)',cursor:'pointer',opacity:csvText.trim()?1:.4}} onClick={handleParse} disabled={!csvText.trim()}>解析預覽</button>:<button style={{flex:2,background:'var(--text)',border:'none',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',fontWeight:500,color:'var(--bg)',cursor:'pointer'}} onClick={()=>{onImport(preview);onClose();}}>確認匯入 {preview.length} 筆</button>}

        {tab==='export'&&(<>
          <div style={SH}>匯出後貼到 Google Sheet 編輯，修改完再回來匯入更新。目前共 <b style={{color:'var(--text)'}}>{items.length}</b> 筆。</div>
          <button style={{width:'100%',background:'var(--text)',border:'none',borderRadius:'1rem',padding:'.85rem',fontFamily:'inherit',fontSize:'.85rem',fontWeight:500,color:'var(--bg)',cursor:'pointer'}} onClick={handleExport}>下載 CSV 檔案</button>
        </>)}
        <div style={{marginTop:'1rem'}}><button style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',color:'var(--text-light)',cursor:'pointer'}} onClick={onClose}>關閉</button></div>
      </div>

  );

function App(){
  const[roomCode,setRoomCode]=React.useState(()=>{const u=new URLSearchParams(window.location.search).get('room');if(u){localStorage.setItem('last_room_hub',u);return u;}return localStorage.getItem('last_room_hub')||'';});
  const[items,setItems]=React.useState([]);
  const[tab,setTab]=React.useState('stock');
  const[showForm,setShowForm]=React.useState(false);
  const[editItem,setEditItem]=React.useState(null);
  const[detailItem,setDetailItem]=React.useState(null);
  const[showCsv,setShowCsv]=React.useState(false);
  const[search,setSearch]=React.useState('');
  const[filterCat,setFilterCat]=React.useState('all');
  const[toast,setToast]=React.useState(null);
  const[online,setOnline]=React.useState(fbOk);
  const[syncing,setSyncing]=React.useState(false);
  const unsub=React.useRef(null);

  React.useEffect(()=>{
    if(!roomCode)return;
    localStorage.setItem('last_room_hub',roomCode);
    const ref=invRef(roomCode);
    const _c=loadL(roomCode);if(_c.length)setItems(_c);
    if(ref){setSyncing(true);unsub.current=ref.orderBy('createdAt','asc').onSnapshot(s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));setItems(d);saveL(roomCode,d);setSyncing(false);setOnline(true);},()=>{setSyncing(false);setOnline(false);});}
    else{setItems(loadL(roomCode));setOnline(false);}
    return()=>{if(unsub.current)unsub.current();};
  },[roomCode]);

  const t2=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};

  async function persist(list,action){
    const ref=invRef(roomCode);
    if(!ref){setItems(list);saveL(roomCode,list);return;}
    try{
      if(action?.type==='add'){const{id,...d}=action.item;await ref.doc(id).set(d);}
      else if(action?.type==='update'){const{id,...d}=action.item;await ref.doc(id).set(d,{merge:true});}
      else if(action?.type==='delete'){await ref.doc(action.id).delete();}
      else if(action?.type==='batch'){const b=db.batch();action.items.forEach(item=>{const{id,...d}=item;b.set(ref.doc(id),d);});await b.commit();}
    }catch{t2('⚠️ 同步失敗');setItems(list);saveL(roomCode,list);}
  }

  async function handleSave(item){const upd=!!(item.id&&items.find(i=>i.id===item.id));const list=upd?items.map(i=>i.id===item.id?item:i):[...items,item];await persist(list,{type:upd?'update':'add',item});t2(upd?'✓ 已儲存':'✓ 已新增');setShowForm(false);setEditItem(null);}
  async function handleDelete(id){await persist(items.filter(i=>i.id!==id),{type:'delete',id});setDetailItem(null);t2('已刪除');}
  async function handleQty(item,delta){const updated={...item,quantity:Math.max(0,item.quantity+delta),updatedAt:Date.now()};const list=items.map(i=>i.id===item.id?updated:i);await persist(list,{type:'update',item:updated});if(detailItem?.id===item.id)setDetailItem(updated);}
  async function handleImport(newItems){const existing=new Set(items.map(i=>i.name));const toAdd=newItems.filter(n=>!existing.has(n.name));if(!toAdd.length){t2('沒有新資料（相同名稱已略過）');return;}await persist([...items,...toAdd],{type:'batch',items:toAdd});t2(`✓ 匯入 ${toAdd.length} 筆`);}

  const lowCount=items.filter(isLow).length;
  const catCount=new Set(items.map(i=>i.category)).size;
  const filtered=items.filter(item=>{if(filterCat!=='all'&&item.category!==filterCat)return false;if(search){const q=search.toLowerCase();return item.name.toLowerCase().includes(q)||(item.barcode||'').includes(q)||(item.location||'').toLowerCase().includes(q);}return true;});
  const grouped=CATS.map(cat=>({cat,items:filtered.filter(i=>i.category===cat.key)})).filter(g=>g.items.length>0);

  if(!roomCode)return <LoginPage onLogin={code=>setRoomCode(code)}/>;
  return(
    <div className="app-wrap">
      <div className="app-header">
        <div className="header-inner">
          <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
            <div className="header-title">庫存管理</div>
            {syncing&&<div style={{fontSize:'.65rem',color:'var(--text-light)'}}>同步中…</div>}
          </div>
          <div className="header-right">
            <div className={`sync-dot${online?'':' offline'}`}/>
            <div className="header-room" onClick={()=>window.location.href='index.html'} style={{cursor:'pointer'}}>🏡</div>
            <div className="header-room" style={{cursor:'pointer'}} onClick={()=>setShowCsv(true)}>⚙️</div>
          </div>
        </div>
      </div>
      <div className="stats-row">
        <div className="stat-card"><div className="stat-num">{items.length}</div><div className="stat-label">品項數</div></div>
        <div className="stat-card stat-low"><div className="stat-num">{lowCount}</div><div className="stat-label">庫存不足</div></div>
        <div className="stat-card"><div className="stat-num">{catCount}</div><div className="stat-label">分類數</div></div>
      </div>
      <div className="tabs-wrap"><div className="tabs"><button className={`tab-btn${tab==='stock'?' active':''}`} onClick={()=>setTab('stock')}>📦 庫存總覽</button><button className={`tab-btn${tab==='shopping'?' active':''}`} onClick={()=>setTab('shopping')}>🛒 待買清單{lowCount>0&&<span className="tab-badge" style={{marginLeft:'.35rem'}}>{lowCount}</span>}</button></div></div>
      {tab==='stock'&&(<>
        <div className="search-wrap"><input className="search-box" placeholder="🔍 搜尋品項、條碼、位置..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="filter-scroll">
          <button className={`filter-chip${filterCat==='all'?' active':''}`} onClick={()=>setFilterCat('all')}>全部 ({items.length})</button>
          {CATS.map(cat=>{const count=items.filter(i=>i.category===cat.key).length;if(!count)return null;return(<button key={cat.key} className={`filter-chip${filterCat===cat.key?' active':''}`} onClick={()=>setFilterCat(cat.key)}>{cat.icon} {cat.label} ({count})</button>);})}
        </div>
        {items.length===0?(<div className="empty-state"><div className="empty-icon">📦</div><div className="empty-text">還沒有任何庫存<br/>點 ＋ 新增，或點 CSV 批量匯入</div></div>):filtered.length===0?(<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">找不到符合條件的品項</div></div>):(grouped.map(({cat,items:ci})=><AccGroup key={cat.key} cat={cat} items={ci} onClick={item=>setDetailItem(item)} onQty={handleQty}/>))}
      </>)}
      {tab==='shopping'&&<ShoppingTab items={items}/>}
      {tab==='stock'&&<button className="fab" onClick={()=>{setEditItem(null);setShowForm(true);}}>＋</button>}
      <div className="bottom-nav">
        {[{icon:'🏡',label:'首頁',href:'index.html'},{icon:'📋',label:'提醒',href:'module-reminders.html'},{icon:'📦',label:'庫存',active:true},{icon:'👗',label:'衣櫥',href:'module-wardrobe.html'},{icon:'📖',label:'百科',href:'module-wiki.html'}].map((n,i)=>(
          <div key={i} className={`nav-item${n.active?' active':''}`} onClick={()=>n.href&&(window.location.href=`${n.href}?room=${roomCode}`)}>
            <div className="nav-item-icon">{n.icon}</div><div className="nav-item-label">{n.label}</div>
          </div>
        ))}
      </div>
      {(showForm||editItem)&&<FormModal initial={editItem} onSave={handleSave} onClose={()=>{setShowForm(false);setEditItem(null);}}/>}
      {detailItem&&<DetailModal item={items.find(i=>i.id===detailItem.id)||detailItem} onClose={()=>setDetailItem(null)} onEdit={()=>{setEditItem(items.find(i=>i.id===detailItem.id)||detailItem);setDetailItem(null);}} onDelete={()=>handleDelete(detailItem.id)} onQty={handleQty}/>}
      {showCsv&&<CsvModal items={items} onImport={handleImport} onClose={()=>setShowCsv(false)}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
