<style>
:root{--bg:#FDFCFA;--card:#F6F2EE;--border:#EDE4E0;--primary:#DCCBC3;--accent:#DDC7BF;--text:#4A3F38;--text-light:#766A63;--success:#8FB17A;--warning:#D4A574;--danger:#C9876B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:350;min-height:100vh;-webkit-font-smoothing:antialiased;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 20% 20%,rgba(220,203,195,.35) 0%,transparent 55%),var(--bg);}
.login-logo{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:350;letter-spacing:.15em;margin-bottom:.4rem;text-align:center;}
.login-sub{font-size:.8rem;color:var(--text-light);letter-spacing:.2em;margin-bottom:3rem;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:2rem;box-shadow:0 4px 24px rgba(88,75,66,.07);padding:2.5rem 2rem;width:100%;max-width:340px;}
.login-label{font-size:.75rem;letter-spacing:.18em;color:var(--text-light);margin-bottom:.6rem;display:block;}
.login-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:1rem;padding:.85rem 1.1rem;font-size:1.1rem;font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);letter-spacing:.25em;text-align:center;outline:none;}
.login-input::placeholder{font-size:.9rem;color:var(--primary);}
.login-hint{font-size:.72rem;color:var(--text-light);text-align:center;margin:.6rem 0 1.8rem;}
.btn-primary{width:100%;background:var(--primary);border:none;border-radius:1rem;padding:.9rem;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.9rem;font-weight:500;color:var(--text);cursor:pointer;}
.app-wrap{max-width:480px;margin:0 auto;padding-bottom:90px;}
.app-header{position:sticky;top:0;z-index:100;background:rgba(253,252,250,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 1.25rem 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:450;letter-spacing:.1em;}
.header-right{display:flex;align-items:center;gap:.5rem;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;box-shadow:0 0 0 2px rgba(143,177,122,.3);}
.sync-dot.offline{background:var(--text-light);box-shadow:none;}
.hbtn{font-size:.78rem;color:var(--text-light);background:var(--card);padding:.25rem .7rem;border-radius:.5rem;border:1px solid var(--border);cursor:pointer;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;padding:.75rem 1rem .65rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:1.1rem;padding:.65rem .4rem;text-align:center;}
.stat-num{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:350;line-height:1;margin-bottom:.2rem;}
.stat-label{font-size:.68rem;color:var(--text-light);}
.batch-bar{background:var(--text);color:var(--bg);padding:.65rem 1.25rem;display:flex;align-items:center;justify-content:space-between;font-size:.82rem;}
.batch-actions{display:flex;gap:.6rem;}
.batch-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:.75rem;padding:.35rem .8rem;font-family:inherit;font-size:.75rem;color:var(--bg);cursor:pointer;}
.batch-btn.red{background:rgba(231,76,60,.4);}
.filter-row{display:flex;gap:.5rem;padding:.3rem 1rem .4rem;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;background:var(--card);border:1px solid var(--border);border-radius:2rem;padding:.28rem .75rem;font-size:.78rem;color:var(--text-light);cursor:pointer;}
.chip.active{background:var(--primary);border-color:var(--primary);color:var(--text);font-weight:500;}
.search-wrap{padding:.65rem 1rem .3rem;}
.search-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.6rem 1rem;font-family:inherit;font-size:.85rem;color:var(--text);outline:none;}
.search-box::placeholder{color:var(--primary);}
.grid-wrap{padding:.5rem 1rem;display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;}
.cloth-card{background:var(--card);border:1.5px solid var(--border);border-radius:1.5rem;overflow:hidden;cursor:pointer;transition:box-shadow .2s;position:relative;}
.cloth-card.selected{border-color:var(--text);}
.cloth-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.cloth-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.8rem;background:linear-gradient(135deg,var(--bg),var(--primary));}
.cloth-body{padding:.6rem .7rem .7rem;}
.cloth-name{font-size:.82rem;font-weight:450;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.3rem;}
.cloth-row{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;}
.cloth-type{font-size:.6rem;padding:.1rem .42rem;border-radius:1rem;background:var(--primary);color:var(--text);}
.cloth-size{font-size:.6rem;padding:.1rem .42rem;border-radius:1rem;background:var(--bg);border:1px solid var(--border);color:var(--text-light);}
.status-badge{font-size:.58rem;padding:.1rem .45rem;border-radius:1rem;font-weight:500;}
.s-current{background:rgba(143,177,122,.2);color:#3d6b30;}
.s-off{background:rgba(220,203,195,.4);color:var(--text-light);}
.s-small{background:rgba(245,196,179,.4);color:#8b3a1e;}
.s-out{background:rgba(211,209,199,.4);color:var(--text-light);}
.worn-dot{position:absolute;top:.55rem;left:.55rem;background:var(--success);border:1.5px solid var(--bg);border-radius:50%;width:9px;height:9px;}
.sel-check{position:absolute;top:.55rem;right:.55rem;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.7rem;}
.sel-check.on{background:var(--text);border-color:var(--text);color:var(--bg);}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-light);}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.5;}
.empty-text{font-size:.85rem;line-height:1.8;}
.fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));right:1.25rem;width:56px;height:56px;border-radius:50%;background:var(--text);border:none;color:var(--bg);font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(88,75,66,.3);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal-overlay{position:fixed;inset:0;background:rgba(88,75,66,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--bg);border-radius:2rem 2rem 0 0;width:100%;max-width:480px;max-height:calc(100vh - 80px);overflow-y:auto;padding:1.5rem 1.5rem calc(5rem + env(safe-area-inset-bottom,0px));}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.5rem;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:450;letter-spacing:.1em;margin-bottom:1.5rem;text-align:center;}
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:.78rem;letter-spacing:.15em;color:var(--text-light);margin-bottom:.5rem;}
.form-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:1rem;padding:.72rem 1rem;font-family:inherit;font-size:.9rem;color:var(--text);outline:none;}
.form-select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:1rem;padding:.72rem 1rem;font-family:inherit;font-size:.88rem;color:var(--text);outline:none;appearance:none;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.modal-actions{display:flex;gap:.75rem;margin-top:1.5rem;}
.btn-cancel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.82rem;font-family:inherit;font-size:.85rem;color:var(--text-light);cursor:pointer;}
.btn-submit{flex:2;background:var(--text);border:none;border-radius:1rem;padding:.82rem;font-family:inherit;font-size:.85rem;font-weight:500;color:var(--bg);cursor:pointer;}
.btn-submit:disabled{opacity:.4;}
.btn-danger{flex:1;background:rgba(201,135,107,.1);border:1px solid rgba(201,135,107,.3);border-radius:1rem;padding:.82rem;font-family:inherit;font-size:.85rem;color:var(--danger);cursor:pointer;}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.75rem 1rem;}
.toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;}
.toggle.on{background:var(--success);}
.toggle.on::after{left:22px;}
.toggle.off{background:var(--border);}
.img-prev{width:100%;aspect-ratio:3/2;border-radius:1.25rem;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:.6rem;background:var(--card);}
.img-prev img{width:100%;height:100%;object-fit:cover;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:1rem;}
.field-item{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:.65rem .85rem;}
.field-lbl{font-size:.62rem;color:var(--text-light);letter-spacing:.1em;margin-bottom:.2rem;}
.field-val{font-size:.83rem;color:var(--text);}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
.status-opt{border:1.5px solid var(--border);border-radius:1rem;padding:.75rem;text-align:center;cursor:pointer;font-size:.82rem;color:var(--text);}
.status-opt.sel{border-color:var(--text);background:var(--text);color:var(--bg);}
.si-row{display:flex;align-items:center;justify-content:space-between;padding:.85rem 0;border-bottom:1px solid var(--border);cursor:pointer;}
.si-row:last-child{border-bottom:none;}
.si-lbl{font-size:.85rem;color:var(--text-light);}
.toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:.65rem 1.4rem;border-radius:2rem;font-size:.8rem;z-index:500;white-space:nowrap;pointer-events:none;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;margin:0 auto;width:100%;max-width:480px;background:rgba(253,252,250,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;flex-direction:row;align-items:center;justify-content:space-around;padding:.6rem 0 calc(.6rem + env(safe-area-inset-bottom,0px));z-index:9999;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;opacity:.4;cursor:pointer;padding:.2rem .8rem;min-width:0;}
.nav-item.active{opacity:1;}
.nav-item-icon{font-size:1.35rem;line-height:1;}
.nav-item-label{font-size:.72rem;letter-spacing:.06em;color:var(--text-light);white-space:nowrap;}
.nav-item.active .nav-item-label{color:var(--text);font-weight:500;}
</style>

<script type="text/babel">
const FB={apiKey:"AIzaSyAFGSQOvAp1thZkWBZ-nLHe-uR8llDQDI8",authDomain:"home-hub-be41f.firebaseapp.com",projectId:"home-hub-be41f",storageBucket:"home-hub-be41f.firebasestorage.app",messagingSenderId:"286497032414",appId:"1:286497032414:web:16d3f0242a400d0de85a4f"};
let db=null,fbOk=false;

const wRef=rc=>db&&fbOk?db.collection('wardrobe').doc(rc).collection('items'):null;

function Login({onLogin}){
  const[c,setC]=React.useState('');const[e,setE]=React.useState('');
  const go=()=>{const t=c.trim();if(!t||t.length<4){setE('至少4位');return;}onLogin(t);};
  return(<div className="login-wrap"><div className="login-logo">家庭數位管家</div><div className="login-sub">WARDROBE</div><div className="login-card"><label className="login-label">房間碼</label><input className="login-input" placeholder="輸入你的房間碼" value={c} maxLength={12} onChange={e=>{setC(e.target.value);setE('');}} onKeyDown={e=>e.key==='Enter'&&go()}/>{e&&<div style={{fontSize:'.72rem',color:'var(--danger)',textAlign:'center',marginTop:'.4rem'}}>{e}</div>}<div className="login-hint">與家人共用相同房間碼</div><button className="btn-primary" onClick={go}>進入衣櫥 →</button></div></div>);
}

function SettingsModal({rc,onCsv,onClose}){

  </div></div>);
}

function CsvModal({clothes,onImport,onClose}){
  const[tab,setTab]=React.useState('guide');
  const[txt,setTxt]=React.useState('');
  const[prev,setPrev]=React.useState(null);
  const[err,setErr]=React.useState('');
  const VT=['上衣','洋裝/連身','裙子/褲子','套裝','外套','居家','配件','其他'];
  const VS=['長袖','短袖','無袖','加厚'];
  const VC=['自購','恩典牌','二手','禮物'];
  const VST=['當季','非當季','穿不下','已轉贈/售出'];
  const EX='name,type,size,sleeve,source,status,location,worn,note\n粉色小兔包屁衣,洋裝/連身,80cm,短袖,自購,當季,臥室第一格,true,\n格紋外套,外套,90cm,長袖,恩典牌,非當季,,false,';
  function parse(){setErr('');setPrev(null);if(!txt.trim()){setErr('請貼上內容');return;}const r=Papa.parse(txt.trim(),{header:true,skipEmptyLines:true});if(!r.data.length){setErr('解析失敗');return;}const p=r.data.map(d=>({id:gid(),name:d.name?.trim()||'',type:VT.includes(d.type?.trim())?d.type.trim():'其他',size:d.size?.trim()||'',sizeDisplay:d.size?.trim()||'',sleeve:VS.includes(d.sleeve?.trim())?d.sleeve.trim():'長袖',source:VC.includes(d.source?.trim())?d.source.trim():'自購',status:VST.includes(d.status?.trim())?d.status.trim():'當季',location:d.location?.trim()||'',worn:d.worn?.trim()==='true',note:d.note?.trim()||'',createdAt:Date.now(),updatedAt:Date.now()}));if(!p.length){setErr('沒有有效資料');return;}setPrev(p);}
  function exportCsv(){const h='name,type,size,sleeve,source,status,location,worn,note';const rows=(clothes||[]).map(c=>[c.name,c.type,c.sizeDisplay||c.size,c.sleeve,c.source,c.status,c.location||'',c.worn?'true':'false',c.note||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));const csv=[h,...rows].join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`wardrobe_${Date.now()}.csv`;a.click();URL.revokeObjectURL(url);}
  const SH={background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.85rem 1rem',fontSize:'.73rem',color:'var(--text-light)',lineHeight:1.8,marginBottom:'.75rem'};
  const SF={...SH,fontFamily:'monospace',fontSize:'.7rem',whiteSpace:'pre-wrap',overflowX:'auto'};
  return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-sheet"><div className="modal-handle"/><div className="modal-title">📊 Google Sheet 批量匯入</div>
    <div style={{display:'flex',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'3px',gap:'3px',marginBottom:'.85rem'}}>
      {[['guide','📋 說明'],['import','📥 匯入'],['export','📤 匯出']].map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'.5rem',border:'none',borderRadius:'.7rem',fontFamily:'inherit',fontSize:'.78rem',cursor:'pointer',background:tab===k?'var(--bg)':'transparent',color:tab===k?'var(--text)':'var(--text-light)',fontWeight:tab===k?500:300}}>{l}</button>))}
    </div>
    {tab==='guide'&&<>
      <div style={SH}><b style={{color:'var(--text)'}}>步驟：</b><br/>① 開啟 Google Sheet，第一列填欄位名稱<br/>② 填寫資料，選項欄位只能填規定的值<br/>③ 全選 → 複製（Ctrl+C）<br/>④ 切換「匯入」→ 貼上 → 解析 → 確認匯入<br/><br/><b style={{color:'var(--text)'}}>更新資料：</b><br/>Sheet 修改後重新複製，再次匯入。<br/>⚠️ 相同 name 會略過，需先刪除再匯入。</div>
      <div style={SH}><b style={{color:'var(--text)'}}>欄位對照：</b><br/><b style={{color:'var(--text)'}}>name</b> — 衣物名稱<br/><b style={{color:'var(--text)'}}>type</b>（必填）— 上衣 / 洋裝/連身 / 裙子/褲子 / 套裝 / 外套 / 居家 / 配件 / 其他<br/><b style={{color:'var(--text)'}}>size</b> — 尺碼（可自訂）<br/><b style={{color:'var(--text)'}}>sleeve</b> — 長袖 / 短袖 / 無袖 / 加厚<br/><b style={{color:'var(--text)'}}>source</b> — 自購 / 恩典牌 / 二手 / 禮物<br/><b style={{color:'var(--text)'}}>status</b> — 當季 / 非當季 / 穿不下 / 已轉贈/售出<br/><b style={{color:'var(--text)'}}>location</b> — 擺放位置<br/><b style={{color:'var(--text)'}}>worn</b> — true 或 false<br/><b style={{color:'var(--text)'}}>note</b> — 備註</div>
      <div style={SF}>{EX}</div>
    </>}
    {tab==='import'&&<>
      <div style={SH}>從 Google Sheet 複製全部資料後貼到下方（含第一列標題）。</div>
      <textarea style={{width:'100%',minHeight:150,background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:'1rem',padding:'.75rem 1rem',fontFamily:'monospace',fontSize:'.75rem',color:'var(--text)',outline:'none',resize:'vertical',lineHeight:1.6,marginBottom:'.75rem'}} placeholder="name,type,size,sleeve,source,status,location,worn,note" value={txt} onChange={e=>{setTxt(e.target.value);setPrev(null);setErr('');}}/>
      {err&&<div style={{fontSize:'.75rem',color:'var(--danger)',marginBottom:'.75rem'}}>{err}</div>}
      {prev&&<div style={{background:'rgba(143,177,122,.1)',border:'1px solid rgba(143,177,122,.3)',borderRadius:'1rem',padding:'.75rem 1rem',marginBottom:'.75rem',fontSize:'.78rem',color:'var(--text)'}}>解析到 <b>{prev.length}</b> 筆{prev.slice(0,3).map((p,i)=><div key={i} style={{fontSize:'.7rem',color:'var(--text-light)',marginTop:'.2rem'}}>• {p.name||'（未命名）'} — {p.type} {p.size}</div>)}</div>}
      <div style={{display:'flex',gap:'.75rem'}}>
        <button style={{flex:1,background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',color:'var(--text-light)',cursor:'pointer'}} onClick={()=>{setTxt('');setPrev(null);setErr('');}}>清除</button>
        {!prev?<button style={{flex:2,background:'var(--text)',border:'none',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',fontWeight:500,color:'var(--bg)',cursor:'pointer',opacity:txt.trim()?1:.4}} onClick={parse} disabled={!txt.trim()}>解析預覽</button>:<button style={{flex:2,background:'var(--text)',border:'none',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',fontWeight:500,color:'var(--bg)',cursor:'pointer'}} onClick={()=>onImport(prev)}>確認匯入 {prev.length} 筆</button>}
      </div>
    </>}
    {tab==='export'&&<>
      <div style={SH}>匯出後貼到 Google Sheet 編輯，再回來匯入更新。目前共 <b style={{color:'var(--text)'}}>{(clothes||[]).length}</b> 件。</div>
      <button style={{width:'100%',background:'var(--text)',border:'none',borderRadius:'1rem',padding:'.85rem',fontFamily:'inherit',fontSize:'.85rem',fontWeight:500,color:'var(--bg)',cursor:'pointer'}} onClick={exportCsv}>下載 CSV 檔案</button>
    </>}
    <div style={{marginTop:'1rem'}}><button style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'1rem',padding:'.82rem',fontFamily:'inherit',fontSize:'.85rem',color:'var(--text-light)',cursor:'pointer'}} onClick={onClose}>關閉</button></div>
  </div></div>);
}

function ClothForm({initial,onSave,onClose}){
  const isEdit=!!initial?.id;
  const[f,setF]=React.useState({name:initial?.name||'',type:initial?.type||'上衣',size:initial?.size||'90cm',sizeCustom:initial?.sizeCustom||'',sleeve:initial?.sleeve||'長袖',source:initial?.source||'自購',status:initial?.status||'當季',location:initial?.location||'',imageUrl:initial?.imageUrl||'',worn:initial?.worn||false,note:initial?.note||''});
  const[imgErr,setImgErr]=React.useState(false);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const save=()=>onSave({...(initial||{}),id:initial?.id||gid(),...f,sizeDisplay:f.size==='自定義'?f.sizeCustom:f.size,createdAt:initial?.createdAt||Date.now(),updatedAt:Date.now()});
  return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-sheet"><div className="modal-handle"/><div className="modal-title">{isEdit?'編輯衣物':'新增衣物'}</div>
    <div className="form-group"><label className="form-label">照片網址（選填）</label><div className="img-prev">{f.imageUrl&&!imgErr?<img src={f.imageUrl} alt="" onError={()=>setImgErr(true)}/>:<span style={{fontSize:'3rem',opacity:.25}}>{TICON[f.type]||'👗'}</span>}</div><input className="form-input" placeholder="https://..." value={f.imageUrl} onChange={e=>{s('imageUrl',e.target.value);setImgErr(false);}}/></div>
    <div className="form-group"><label className="form-label">名稱（選填）</label><input className="form-input" placeholder="例：粉色小兔包屁衣" value={f.name} onChange={e=>s('name',e.target.value)}/></div>
    <div className="form-row"><div className="form-group"><label className="form-label">類型</label><select className="form-select" value={f.type} onChange={e=>s('type',e.target.value)}>{TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div><div className="form-group"><label className="form-label">狀態</label><select className="form-select" value={f.status} onChange={e=>s('status',e.target.value)}>{STATUSES.map(t=><option key={t} value={t}>{t}</option>)}</select></div></div>
    <div className="form-row"><div className="form-group"><label className="form-label">尺碼</label><select className="form-select" value={f.size} onChange={e=>s('size',e.target.value)}>{SIZES.map(t=><option key={t} value={t}>{t}</option>)}</select></div><div className="form-group"><label className="form-label">袖長</label><select className="form-select" value={f.sleeve} onChange={e=>s('sleeve',e.target.value)}>{SLEEVES.map(t=><option key={t} value={t}>{t}</option>)}</select></div></div>
    {f.size==='自定義'&&<div className="form-group"><label className="form-label">自訂尺碼</label><input className="form-input" value={f.sizeCustom} onChange={e=>s('sizeCustom',e.target.value)}/></div>}
    <div className="form-row"><div className="form-group"><label className="form-label">來源</label><select className="form-select" value={f.source} onChange={e=>s('source',e.target.value)}>{SOURCES.map(t=><option key={t} value={t}>{t}</option>)}</select></div><div className="form-group"><label className="form-label">擺放位置</label><input className="form-input" placeholder="臥室衣櫃第二格" value={f.location} onChange={e=>s('location',e.target.value)}/></div></div>
    <div className="form-group"><div className="toggle-wrap"><span style={{fontSize:'.88rem'}}>已實際穿過</span><button className={`toggle ${f.worn?'on':'off'}`} onClick={()=>s('worn',!f.worn)}/></div></div>
    <div className="form-group"><label className="form-label">備註（選填）</label><input className="form-input" value={f.note} onChange={e=>s('note',e.target.value)}/></div>
    <div className="modal-actions"><button className="btn-cancel" onClick={onClose}>取消</button><button className="btn-submit" onClick={save}>{isEdit?'儲存修改':'新增'}</button></div>
  </div></div>);
}

function DetailModal({cloth,onClose,onEdit,onDelete}){
  const[confirm,setConfirm]=React.useState(false);
  const[imgErr,setImgErr]=React.useState(false);
  const icon=TICON[cloth.type]||'👗';
  const sizeShow=cloth.size==='自定義'?(cloth.sizeCustom||cloth.sizeDisplay||'—'):cloth.size;
  if(confirm)return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setConfirm(false)}><div className="modal-sheet"><div className="modal-handle"/><div style={{textAlign:'center',padding:'1rem'}}><div style={{fontSize:'2rem',marginBottom:'1rem'}}>🗑️</div><div style={{fontFamily:'Noto Serif TC',fontSize:'1.1rem',marginBottom:'.5rem'}}>確認刪除？</div><div style={{fontSize:'.82rem',color:'var(--text-light)'}}>{cloth.name||cloth.type}</div></div><div className="modal-actions"><button className="btn-cancel" onClick={()=>setConfirm(false)}>取消</button><button className="btn-submit" style={{background:'var(--danger)'}} onClick={onDelete}>確認刪除</button></div></div></div>);
  return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-sheet"><div className="modal-handle"/>
    <div style={{width:'100%',aspectRatio:'4/3',borderRadius:'1.5rem',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'4rem',overflow:'hidden',marginBottom:'1.1rem',background:'linear-gradient(135deg,var(--bg),var(--primary))'}}>
      {cloth.imageUrl&&!imgErr?<img src={cloth.imageUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>setImgErr(true)}/>:<span>{icon}</span>}
    </div>
    <div style={{display:'flex',alignItems:'center',gap:'.65rem',marginBottom:'.75rem'}}>
      <div style={{fontFamily:'Noto Serif TC',fontSize:'1.15rem',fontWeight:400}}>{cloth.name||'（未命名）'}</div>
      <span className={`status-badge ${SCSS[cloth.status]||'s-off'}`}>{SLBL[cloth.status]||cloth.status}</span>
      {cloth.worn&&<span style={{fontSize:'.65rem',color:'var(--success)'}}>✓ 穿過</span>}
    </div>
    <div className="field-grid">
      <div className="field-item"><div className="field-lbl">類型</div><div className="field-val">{icon} {cloth.type}</div></div>
      <div className="field-item"><div className="field-lbl">尺碼</div><div className="field-val">{sizeShow}</div></div>
      <div className="field-item"><div className="field-lbl">袖長</div><div className="field-val">{cloth.sleeve}</div></div>
      <div className="field-item"><div className="field-lbl">來源</div><div className="field-val">{cloth.source}</div></div>
      {cloth.location&&<div className="field-item" style={{gridColumn:'1/-1'}}><div className="field-lbl">擺放位置</div><div className="field-val">📍 {cloth.location}</div></div>}
      {cloth.note&&<div className="field-item" style={{gridColumn:'1/-1'}}><div className="field-lbl">備註</div><div className="field-val">{cloth.note}</div></div>}
    </div>
    <div className="modal-actions"><button className="btn-danger" onClick={()=>setConfirm(true)}>刪除</button><button className="btn-cancel" onClick={onEdit}>編輯</button><button className="btn-submit" onClick={onClose}>關閉</button></div>
  </div></div>);
}

function BatchStatusModal({count,onSave,onClose}){
  const[sel,setSel]=React.useState('穿不下');
  return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-sheet"><div className="modal-handle"/><div className="modal-title">批次修改狀態</div><div style={{fontSize:'.8rem',color:'var(--text-light)',textAlign:'center',marginBottom:'1.25rem'}}>將 {count} 件衣物的狀態改為：</div><div className="status-grid">{STATUSES.map(st=>(<div key={st} className={`status-opt${sel===st?' sel':''}`} onClick={()=>setSel(st)}>{st}</div>))}</div><div className="modal-actions"><button className="btn-cancel" onClick={onClose}>取消</button><button className="btn-submit" onClick={()=>onSave(sel)}>確認修改</button></div></div></div>);
}

function ClothCard({cloth,onClick,batchMode,selected,onSelect}){
  const[imgErr,setImgErr]=React.useState(false);
  const icon=TICON[cloth.type]||'👗';
  const sizeShow=cloth.size==='自定義'?(cloth.sizeCustom||cloth.sizeDisplay||''):cloth.size;
  const click=()=>batchMode?onSelect(cloth.id):onClick();
  return(<div className={`cloth-card${selected?' selected':''}`} onClick={click}>
    {cloth.worn&&!batchMode&&<div className="worn-dot"/>}
    {batchMode&&<div className={`sel-check${selected?' on':''}`}>{selected&&'✓'}</div>}
    {cloth.imageUrl&&!imgErr?<img className="cloth-img" src={cloth.imageUrl} alt="" onError={()=>setImgErr(true)}/>:<div className="cloth-placeholder">{icon}</div>}
    <div className="cloth-body">
      <div className="cloth-name">{cloth.name||'（未命名）'}</div>
      <div className="cloth-row">
        <span className="cloth-type">{cloth.type}</span>
        {sizeShow&&<span className="cloth-size">{sizeShow}</span>}
        <span className={`status-badge ${SCSS[cloth.status]||'s-off'}`}>{SLBL[cloth.status]||cloth.status}</span>
      </div>
    </div>
  </div>);
}

function App(){
  const[rc,setRc]=React.useState(()=>{const u=new URLSearchParams(window.location.search).get('room');if(u){localStorage.setItem('last_room_hub',u);return u;}return localStorage.getItem('last_room_hub')||'';});
  const[clothes,setClothes]=React.useState([]);
  const[search,setSearch]=React.useState('');
  const[fType,setFType]=React.useState('all');
  const[fStatus,setFStatus]=React.useState('all');
  const[fWorn,setFWorn]=React.useState('all');
  const[showForm,setShowForm]=React.useState(false);
  const[editItem,setEditItem]=React.useState(null);
  const[detail,setDetail]=React.useState(null);
  const[batch,setBatch]=React.useState(false);
  const[selected,setSelected]=React.useState(new Set());
  const[batchStatus,setBatchStatus]=React.useState(false);
  const[showSettings,setShowSettings]=React.useState(false);
  const[showCsv,setShowCsv]=React.useState(false);
  const[toast,setToast]=React.useState(null);
  const[online,setOnline]=React.useState(fbOk);
  const[syncing,setSyncing]=React.useState(false);
  const unsub=React.useRef(null);

  React.useEffect(()=>{
    if(!rc)return;
    localStorage.setItem('last_room_hub',rc);
    const ref=wRef(rc);
    if(ref){setSyncing(true);unsub.current=ref.orderBy('createdAt','asc').onSnapshot(s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));setClothes(d);SL(`ward2_${rc}`,d);setSyncing(false);setOnline(true);},()=>{setClothes(LL(`ward2_${rc}`)||[]);setSyncing(false);setOnline(false);});}
    else{setClothes(LL(`ward2_${rc}`)||[]);setOnline(false);}
    return()=>{if(unsub.current)unsub.current();};
  },[rc]);

  const t2=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};

  async function persist(list,action){
    const ref=wRef(rc);
    if(!ref){setClothes(list);SL(`ward2_${rc}`,list);return;}
    try{
      if(action?.type==='add'){const{id,...d}=action.item;await ref.doc(id).set(d);}
      else if(action?.type==='update'){const{id,...d}=action.item;await ref.doc(id).set(d,{merge:true});}
      else if(action?.type==='delete'){await ref.doc(action.id).delete();}
      else if(action?.type==='deleteMany'){const b=db.batch();action.ids.forEach(id=>b.delete(ref.doc(id)));await b.commit();}
      else if(action?.type==='updateMany'){const b=db.batch();action.items.forEach(item=>{const{id,...d}=item;b.set(ref.doc(id),d,{merge:true});});await b.commit();}
      else if(action?.type==='batch'){const b=db.batch();action.items.forEach(item=>{const{id,...d}=item;b.set(ref.doc(id),d);});await b.commit();}
    }catch{t2('⚠️ 同步失敗');setClothes(list);SL(`ward2_${rc}`,list);}
  }

  const saveFn=async item=>{const upd=!!(item.id&&clothes.find(c=>c.id===item.id));const list=upd?clothes.map(c=>c.id===item.id?item:c):[...clothes,item];await persist(list,{type:upd?'update':'add',item});t2(upd?'✓ 已儲存':'✓ 已新增');setShowForm(false);setEditItem(null);};
  const delFn=async id=>{await persist(clothes.filter(c=>c.id!==id),{type:'delete',id});setDetail(null);t2('已刪除');};
  const csvImport=async newItems=>{const ex=new Set(clothes.map(c=>c.name+c.type));const toAdd=newItems.filter(n=>!ex.has(n.name+n.type));if(!toAdd.length){t2('沒有新資料（重複略過）');setShowCsv(false);return;}await persist([...clothes,...toAdd],{type:'batch',items:toAdd});setShowCsv(false);t2(`✓ 匯入 ${toAdd.length} 筆`);};
  const batchDel=async()=>{if(!window.confirm(`確定刪除 ${selected.size} 件？`))return;const ids=[...selected];await persist(clothes.filter(c=>!selected.has(c.id)),{type:'deleteMany',ids});setSelected(new Set());setBatch(false);t2(`✓ 刪除 ${ids.length} 件`);};
  const batchSt=async st=>{const items=clothes.map(c=>selected.has(c.id)?{...c,status:st,updatedAt:Date.now()}:c);const ch=items.filter(c=>selected.has(c.id));await persist(items,{type:'updateMany',items:ch});setSelected(new Set());setBatch(false);setBatchStatus(false);t2(`✓ 更新 ${ch.length} 件`);};
  const toggleSel=id=>setSelected(s=>{const ns=new Set(s);ns.has(id)?ns.delete(id):ns.add(id);return ns;});

  const filtered=clothes.filter(c=>{
    if(fType!=='all'&&c.type!==fType)return false;
    if(fStatus!=='all'&&c.status!==fStatus)return false;
    if(fWorn==='worn'&&!c.worn)return false;
    if(fWorn==='unworn'&&c.worn)return false;
    if(search){const q=search.toLowerCase();return(c.name||'').toLowerCase().includes(q)||(c.location||'').toLowerCase().includes(q);}
    return true;
  });

  const total=clothes.length;
  const current=clothes.filter(c=>c.status==='當季').length;
  const offSeason=clothes.filter(c=>c.status==='非當季').length;
  const unworn=clothes.filter(c=>!c.worn).length;

  if(!rc)return <Login onLogin={code=>setRc(code)}/>;

  return(<div className="app-wrap">
    <div className="app-header"><div className="header-inner">
      <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
        <div className="header-title">電子衣櫥</div>
        {syncing&&<span style={{fontSize:'.65rem',color:'var(--text-light)'}}>同步中…</span>}
      </div>
      <div className="header-right">
        <div className={`sync-dot${online?'':' offline'}`}/>
        <div className="hbtn" onClick={()=>window.location.href='index.html'}>🏡</div>
        <div className="hbtn" onClick={()=>setShowSettings(true)}>⚙️</div>
      </div>
    </div></div>

    {batch&&(<div className="batch-bar"><span>已選 {selected.size} 件</span><div className="batch-actions"><button className="batch-btn" onClick={()=>selected.size===filtered.length?setSelected(new Set()):setSelected(new Set(filtered.map(c=>c.id)))}>{selected.size===filtered.length?'取消全選':'全選'}</button><button className="batch-btn" style={{opacity:selected.size===0?.4:1}} onClick={()=>selected.size>0&&setBatchStatus(true)}>修改狀態</button><button className="batch-btn red" style={{opacity:selected.size===0?.4:1}} onClick={()=>selected.size>0&&batchDel()}>刪除</button></div></div>)}

    <div className="stats-row">
      <div className="stat-card"><div className="stat-num">{total}</div><div className="stat-label">總計</div></div>
      <div className="stat-card"><div className="stat-num" style={{color:'var(--success)'}}>{current}</div><div className="stat-label">當季</div></div>
      <div className="stat-card"><div className="stat-num" style={{color:'var(--warning)'}}>{offSeason}</div><div className="stat-label">非當季</div></div>
      <div className="stat-card"><div className="stat-num" style={{color:'var(--text-light)'}}>{unworn}</div><div className="stat-label">未穿過</div></div>
    </div>

    <div className="search-wrap"><input className="search-box" placeholder="🔍 搜尋名稱、位置…" value={search} onChange={e=>setSearch(e.target.value)}/></div>

    <div className="filter-row">
      <button className={`chip${fType==='all'?' active':''}`} onClick={()=>setFType('all')}>全部類型</button>
      {TYPES.filter(t=>clothes.some(c=>c.type===t)).map(t=>(<button key={t} className={`chip${fType===t?' active':''}`} onClick={()=>setFType(t)}>{TICON[t]} {t}</button>))}
    </div>
    <div className="filter-row" style={{paddingTop:0}}>
      <button className={`chip${fStatus==='all'?' active':''}`} onClick={()=>setFStatus('all')}>全部狀態</button>
      {STATUSES.map(st=>(<button key={st} className={`chip${fStatus===st?' active':''}`} onClick={()=>setFStatus(st)}>{st}</button>))}
    </div>
    <div className="filter-row" style={{paddingTop:0,paddingBottom:'.65rem'}}>
      <button className={`chip${fWorn==='all'?' active':''}`} onClick={()=>setFWorn('all')}>全部</button>
      <button className={`chip${fWorn==='worn'?' active':''}`} onClick={()=>setFWorn('worn')}>✓ 穿過</button>
      <button className={`chip${fWorn==='unworn'?' active':''}`} onClick={()=>setFWorn('unworn')}>○ 未穿過</button>
    </div>

    {clothes.length===0?(<div className="empty-state"><div className="empty-icon">👗</div><div className="empty-text">衣櫥還是空的<br/>點 ＋ 新增，或點 ⚙️ 批量匯入</div></div>):
     filtered.length===0?(<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">找不到符合條件的衣物</div></div>):
     (<div className="grid-wrap">{filtered.map(c=>(<ClothCard key={c.id} cloth={c} batchMode={batch} selected={selected.has(c.id)} onSelect={toggleSel} onClick={()=>setDetail(c)}/>))}</div>)
    }

    {!batch&&<button className="fab" onClick={()=>{setEditItem(null);setShowForm(true);}}>＋</button>}

    <div className="bottom-nav">
      {[{icon:'🏡',label:'首頁',href:'index.html'},{icon:'📋',label:'提醒',href:'module-reminders.html'},{icon:'📦',label:'庫存',href:'module-inventory.html'},{icon:'👗',label:'衣櫥',active:true},{icon:'📖',label:'百科',href:'module-wiki.html'}].map((n,i)=>(
        <div key={i} className={`nav-item${n.active?' active':''}`} onClick={()=>n.href&&(window.location.href=`${n.href}?room=${rc}`)}>
          <div className="nav-item-icon">{n.icon}</div>
          <div className="nav-item-label">{n.label}</div>
        </div>
      ))}
    </div>

    {showSettings&&<SettingsModal rc={rc} onCsv={()=>setShowCsv(true)} onClose={()=>setShowSettings(false)}/>}
    {showCsv&&<CsvModal clothes={clothes} onImport={csvImport} onClose={()=>setShowCsv(false)}/>}
    {(showForm||editItem)&&<ClothForm initial={editItem} onSave={saveFn} onClose={()=>{setShowForm(false);setEditItem(null);}}/>}
    {detail&&<DetailModal cloth={clothes.find(c=>c.id===detail.id)||detail} onClose={()=>setDetail(null)} onEdit={()=>{setEditItem(clothes.find(c=>c.id===detail.id)||detail);setDetail(null);}} onDelete={()=>delFn(detail.id)}/>}
    {batchStatus&&<BatchStatusModal count={selected.size} onSave={batchSt} onClose={()=>setBatchStatus(false)}/>}
    {toast&&<div className="toast">{toast}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
